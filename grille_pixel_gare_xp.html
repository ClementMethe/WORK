<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.panel{display:flex;gap:16px;padding:1rem 0;flex-wrap:wrap}
.controls{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:12px}
.ctrl-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
select,input[type=text],input[type=range]{width:100%}
.cell-w-label{font-size:11px;color:var(--color-text-tertiary)}
canvas{display:block;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md)}
.preview-area{flex:1;min-width:300px}
.row-info{font-size:11px;color:var(--color-text-secondary);margin-top:8px;line-height:1.6}
.btn{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 14px;font-size:13px;cursor:pointer;width:100%;color:var(--color-text-primary)}
.btn:hover{background:var(--color-background-secondary)}
.btn-export{margin-top:4px}
.section-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.text-input-row{display:flex;gap:6px}
.text-input-row input[type=text]{flex:1}
</style>

<div class="panel">
  <div class="controls">
    <div>
      <div class="section-title">Texte</div>
      <div class="text-input-row" style="margin-top:6px">
        <input type="text" id="inputText" value="Hamburgefons" style="font-size:13px">
      </div>
    </div>
    <div>
      <div class="section-title">Police</div>
      <select id="fontSelect" style="margin-top:6px;font-size:13px">
        <option value="serif">Serif (Georgia)</option>
        <option value="sans-serif" selected>Sans-serif (Arial)</option>
        <option value="monospace">Monospace</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Impact">Impact</option>
        <option value="Garamond">Garamond</option>
        <option value="Futura,sans-serif">Futura</option>
        <option value="Didot,serif">Didot</option>
      </select>
    </div>
    <div>
  <div class="section-title">Police personnalisée</div>
  <input type="file" id="customFontInput" accept=".ttf,.otf,.woff,.woff2" style="margin-top:6px">
</div>

    <div>
      <div class="section-title">Seuil de remplissage</div>
      <input type="range" id="threshold" min="10" max="80" value="40" step="1" style="margin-top:6px">
      <div class="cell-w-label">Couverture min. pour activer une cellule : <span id="threshVal">40</span>%</div>
    </div>

    <div>
  <div class="section-title">Offset vertical</div>
  <input type="range" id="yOffset" min="-50" max="50" value="0" step="1" style="margin-top:6px">
  <div class="cell-w-label">Décalage : <span id="yOffsetVal">0</span> px</div>
</div>

<div>
  <div class="section-title">Offset horizontal</div>
  <input type="range" id="xOffset" min="-50" max="50" value="0" step="1">
  <div class="cell-w-label">Décalage : <span id="xOffsetVal">0</span> px</div>
</div>

<div>
  <div class="section-title">Couleur du texte</div>
  <input type="color" id="textColor" value="#000000">
</div>



    <div>
      <div class="section-title">Zoom</div>
      <input type="range" id="zoom" min="1" max="4" value="2" step="0.5" style="margin-top:6px">
      <div class="cell-w-label">×<span id="zoomVal">2</span></div>
    </div>
    <div class="row-info">
    régler pb affiche de certaines lettres
    </div>
    <button class="btn btn-export" id="exportSVG">Exporter SVG ↗</button>
    <button class="btn" id="sendToChat">Générer la fonte .ttf marche pas encore.....)↗</button>
  </div>

  <div class="preview-area">
    <canvas id="mainCanvas"></canvas>
  </div>
</div>

<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const offCanvas = document.createElement('canvas');
const offCtx = offCanvas.getContext('2d');

const ROW_COUNT = 10;

//  NOUVELLES HAUTEURS DE RANGÉES
const ROW_TYPES = [
  19.5,19.5,19.5,19.5,
   5,   5,
  19.5,19.5,19.5,19.5
];

//  LARGEUR FIXE DES COLONNES
const COL_UNIT = 5;

function getState(){
  return {
    text: document.getElementById('inputText').value || 'A',
    font: document.getElementById('fontSelect').value,
    threshold: parseInt(document.getElementById('threshold').value)/100,
    zoom: parseFloat(document.getElementById('zoom').value),
    yOffset: parseInt(document.getElementById('yOffset').value), // ← VIRGULE ICI
    xOffset: parseInt(document.getElementById('xOffset').value),
    textColor: document.getElementById('textColor').value
  };
}




let customFontName = null;

document.getElementById("customFontInput").addEventListener("change", async function(e){
  const file = e.target.files[0];
  if(!file) return;



  // 1) Créer un nom de famille propre (sans extension, sans espaces)
  const baseName = file.name.replace(/\.[^/.]+$/, ""); // enlève .ttf / .otf / ...
  const familyName = "Custom_" + baseName.replace(/\s+/g, "_"); // évite les espaces

  // 2) Charger les données de la font
  const fontData = await file.arrayBuffer();
  const font = new FontFace(familyName, fontData);

  // 3) Charger et enregistrer la font
  await font.load();
  document.fonts.add(font);

  customFontName = familyName;

  // 4) Ajouter la font dans le select
  const fontSelect = document.getElementById("fontSelect");
  const opt = document.createElement("option");
  opt.value = customFontName;
  opt.textContent = "Custom: " + baseName;
  fontSelect.appendChild(opt);

  // 5) Sélectionner automatiquement la font custom
  fontSelect.value = customFontName;

  // 6) Re-render
  render();
});



function render(){
  const {text, font, threshold, zoom, yOffset, xOffset, textColor} = getState();
  console.log('[render] yOffset =', yOffset);
  console.log("[render] textColor =", textColor);

  const chars = text.split('');

  // Calcul des hauteurs réelles
  const rowHeights = ROW_TYPES.map(h => h * zoom);
  const rowY = [0];
  for(let i=1;i<ROW_COUNT;i++){
    rowY[i] = rowY[i-1] + rowHeights[i-1];
  }
  const totalH = rowHeights.reduce((a,b)=>a+b,0);

  //  Largeur fixe des colonnes
  const CELL_W = COL_UNIT * zoom;

  const glyphs = [];
  let totalCols = 0;

  for(const ch of chars){

    // Large offscreen canvas
    offCanvas.width = CELL_W * 40;
    offCanvas.height = totalH;

    offCtx.clearRect(0,0,offCanvas.width,offCanvas.height);
    offCtx.fillStyle=textColor;
    offCtx.font = `bold ${totalH*0.85}px ${font}`;
    offCtx.textBaseline='alphabetic';
    const bY = totalH*0.78 + yOffset;
    console.log('[render] bY =', bY);
    const charW = offCtx.measureText(ch).width;
    offCtx.fillStyle = textColor;
    offCtx.fillText(ch, (offCanvas.width - charW)/2 + xOffset, bY);



    const imgData = offCtx.getImageData(0,0,offCanvas.width,offCanvas.height);

    let firstCol=-1, lastCol=-1;
    const cols = Math.ceil(offCanvas.width / CELL_W);
    const grid=[];

    for(let r=0;r<ROW_COUNT;r++){
      grid[r]=[];
      const ry = Math.round(rowY[r]);
      const rh = Math.round(rowHeights[r]);

      for(let c=0;c<cols;c++){
        const cx = Math.round(c * CELL_W);
        const cw = CELL_W;

        let filled=0,total=0;
        for(let py=ry;py<Math.min(ry+rh,offCanvas.height);py++){
          for(let px=cx;px<Math.min(cx+cw,offCanvas.width);px++){
            const i=(py*offCanvas.width+px)*4;
            if(imgData.data[i+3]>10) filled++;
            total++;
          }
        }

        const on = total>0 && filled/total>=threshold;
        grid[r][c]=on;

        if(on){
          if(firstCol===-1) firstCol=c;
          lastCol=c;
        }
      }
    }

// Sécurité : si aucune colonne détectée
if (firstCol === -1) {
  firstCol = 0;
  lastCol = cols - 1;
}

// Ajout d’une marge de sécurité
const leftPad = 10;
const rightPad = 6;

const startCol = Math.max(0, firstCol - leftPad);
const endCol   = Math.min(cols - 1, lastCol + rightPad);

const glyphCols = endCol - startCol + 1;

const trimmed = [];
for (let r = 0; r < ROW_COUNT; r++) {
  trimmed[r] = [];
  for (let c = 0; c < glyphCols; c++) {
    trimmed[r][c] = grid[r][startCol + c] || false;
  }
}


    glyphs.push({grid:trimmed, cols:glyphCols});
    totalCols += glyphCols + 1;
  }

  totalCols = Math.max(totalCols - 1, 1);

  canvas.width = totalCols * CELL_W + 2;
  canvas.height = totalH + 2;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let xOff = 1;

  for(const {grid, cols} of glyphs){
    for(let r=0;r<ROW_COUNT;r++){
      for(let c=0;c<cols;c++){
        const x = xOff + c*CELL_W;
        const y = 1 + rowY[r];
        const cw = CELL_W;
        const ch = rowHeights[r];

        if(grid[r][c]){
          ctx.fillStyle=textColor;
          ctx.fillRect(x,y,cw-0.5,ch-0.5);
        } else {
          ctx.fillStyle='rgba(0,0,0,0.04)';
          ctx.fillRect(x,y,cw-0.5,ch-0.5);
          ctx.strokeStyle='rgba(0,0,0,0.08)';
          ctx.lineWidth=0.3;
          ctx.strokeRect(x+0.15,y+0.15,cw-0.8,ch-0.8);
        }
      }
    }

    xOff += (cols+1)*CELL_W;
  }
}

document.getElementById('threshold').oninput=function(){
  document.getElementById('threshVal').textContent=this.value;
  render();
};
document.getElementById('zoom').oninput=function(){
  document.getElementById('zoomVal').textContent=this.value;
  render();
};
document.getElementById('fontSelect').onchange=render;
document.getElementById('inputText').oninput=render;



document.getElementById('yOffset').oninput = function(){
  document.getElementById('yOffsetVal').textContent = this.value;
  render();
};

document.getElementById('xOffset').oninput = function(){
  console.log('[slider] xOffset =', this.value);
  document.getElementById('xOffsetVal').textContent = this.value;
  render();
};

document.getElementById('textColor').oninput = function(){
  console.log("[listener] textColor =", this.value);
  render();
};



document.getElementById('exportSVG').onclick=function(){
  const {text, font, threshold, zoom, yOffset, xOffset, textColor} = getState();
  console.log('[exportSVG] yOffset =', yOffset);


  const rowHeights = ROW_TYPES.map(h => h * zoom);
  const rowY = [0];
  for(let i=1;i<ROW_COUNT;i++){
    rowY[i] = rowY[i-1] + rowHeights[i-1];
  }
  const totalH = rowHeights.reduce((a,b)=>a+b,0);
  const CELL_W = COL_UNIT * zoom;

  let svgContent='';
  let xOff=0;
  const chars=text.split('');

  for(const ch of chars){

    offCanvas.width = CELL_W * 40;
    offCanvas.height = totalH;

    offCtx.clearRect(0,0,offCanvas.width,offCanvas.height);
    offCtx.fillStyle=textColor;
    offCtx.font=`bold ${totalH*0.85}px ${font}`;
    offCtx.textBaseline='alphabetic';
    const bY=totalH*0.78 + yOffset;
    const charW=offCtx.measureText(ch).width;
    offCtx.fillText(ch,(offCanvas.width-charW)/2 + xOffset, bY);


    const imgData=offCtx.getImageData(0,0,offCanvas.width,offCanvas.height);
    const cols=Math.ceil(offCanvas.width/CELL_W);
    const grid=[];
    let fc=-1,lc=-1;

    for(let r=0;r<ROW_COUNT;r++){
      grid[r]=[];
      const ry=rowY[r];
      const rh=rowHeights[r];

      for(let c=0;c<cols;c++){
        const cx=c*CELL_W;
        let filled=0,total=0;

        for(let py=ry;py<Math.min(ry+rh,offCanvas.height);py++){
          for(let px=cx;px<Math.min(cx+CELL_W,offCanvas.width);px++){
            const i=(py*offCanvas.width+px)*4;
            if(imgData.data[i+3]>10)filled++;
            total++;
          }
        }

        const on=total>0&&filled/total>=threshold;
        grid[r][c]=on;
        if(on){if(fc===-1)fc=c;lc=c;}
      }
    }

    if(fc===-1){fc=0;lc=2;}
    const gc=lc-fc+3;

    for(let r=0;r<ROW_COUNT;r++){
      for(let c=0;c<gc;c++){
        const on=grid[r][Math.max(0,fc-1+c)]||false;
        if(on){
          const x=xOff+c*CELL_W;
          const y=rowY[r];
          svgContent+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(CELL_W-0.5).toFixed(1)}" height="${(rowHeights[r]-0.5).toFixed(1)}" fill=textColor/>`;
        }
      }
    }

    xOff+=(gc+1)*CELL_W;
  }

  const svgStr=`<svg xmlns="http://www.w3.org/2000/svg" width="${xOff.toFixed(0)}" height="${totalH.toFixed(0)}">${svgContent}</svg>`;
  const blob=new Blob([svgStr],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='typo-grille.svg';a.click();
};


render();
</script>
